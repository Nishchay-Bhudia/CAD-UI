<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AeroCAD — Aerospace Conceptual Design</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <!-- Three.js ES Module Import Map -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

  <!-- ── 3D Viewport ── -->
  <canvas id="viewport"></canvas>

  <!-- ── Top Bar ── -->
  <div id="topbar">
    <div class="brand">⚡ AeroCAD</div>

    <div class="project-controls">
      <input id="projectNameInput" type="text" placeholder="Project name…" />
      <button id="saveBtn" class="btn">Save</button>
      <select id="loadSelect">
        <option value="">Load project…</option>
      </select>
      <button id="loadBtn" class="btn">Load</button>
      <button id="deleteBtn" class="btn btn-amber">Delete</button>
      <button id="exportBtn" class="btn btn-amber">Export STL</button>
    </div>

    <div class="connection-status">
      <span id="statusDot" class="dot checking"></span>
      <span id="statusText">Connecting…</span>
    </div>
  </div>

  <!-- ── Left Sidebar: Assembly Tree ── -->
  <div id="leftSidebar">
    <div class="sidebar-header">Assembly Tree</div>
    <ul class="assembly-tree" id="assemblyTree">
      <li class="tree-item active" data-part="fuselage">
        <span class="tree-icon">▶</span>
        <span class="tree-label">Fuselage</span>
        <span class="tree-vis" title="Toggle visibility">👁</span>
      </li>
      <li class="tree-item active" data-part="wing-left">
        <span class="tree-icon">▶</span>
        <span class="tree-label">Wing (Left)</span>
        <span class="tree-vis" title="Toggle visibility">👁</span>
      </li>
      <li class="tree-item active" data-part="wing-right">
        <span class="tree-icon">▶</span>
        <span class="tree-label">Wing (Right)</span>
        <span class="tree-vis" title="Toggle visibility">👁</span>
      </li>
      <li class="tree-item active" data-part="cog">
        <span class="tree-icon">●</span>
        <span class="tree-label">CoG Marker</span>
        <span class="tree-vis" title="Toggle visibility">👁</span>
      </li>
    </ul>
    <div class="sidebar-footer">
      <button id="frameBtn" class="btn-outline">Frame All</button>
      <button id="wireframeToggle" class="btn-outline">Wireframe</button>
    </div>
  </div>

  <!-- ── Right Sidebar: Parametric Controls ── -->
  <div id="rightSidebar">

    <!-- Airfoil & Wing Section -->
    <div class="panel-section">
      <h3>Airfoil &amp; Wing</h3>

      <div class="field">
        <label>NACA 4-Digit Profile</label>
        <div class="naca-row">
          <input type="text" id="nacaInput" value="2412" maxlength="4" spellcheck="false" />
          <button id="nacaApplyBtn" class="btn-sm">Apply</button>
        </div>
      </div>

      <div class="field">
        <label>Wingspan <span class="unit">m</span></label>
        <input type="range" id="wingspanSlider" min="2" max="60" step="0.1" value="10" />
        <input type="number" id="wingspanNum" min="2" max="60" step="0.1" value="10" />
      </div>

      <div class="field">
        <label>Root Chord <span class="unit">m</span></label>
        <input type="range" id="chordSlider" min="0.5" max="12" step="0.05" value="2" />
        <input type="number" id="chordNum" min="0.5" max="12" step="0.05" value="2" />
      </div>

      <div class="field">
        <label>Taper Ratio <span class="unit">tip/root</span></label>
        <input type="range" id="taperSlider" min="0.15" max="1.0" step="0.01" value="1.0" />
        <input type="number" id="taperNum" min="0.15" max="1.0" step="0.01" value="1.0" />
      </div>

      <div class="field">
        <label>Sweep Angle <span class="unit">°</span></label>
        <input type="range" id="sweepSlider" min="-10" max="70" step="0.5" value="15" />
        <input type="number" id="sweepNum" min="-10" max="70" step="0.5" value="15" />
      </div>

      <div class="field">
        <label>Dihedral <span class="unit">°</span></label>
        <input type="range" id="dihedralSlider" min="-15" max="20" step="0.5" value="5" />
        <input type="number" id="dihedralNum" min="-15" max="20" step="0.5" value="5" />
      </div>

      <div class="field">
        <label>Washout / Twist <span class="unit">°</span></label>
        <input type="range" id="twistSlider" min="-12" max="12" step="0.5" value="0" />
        <input type="number" id="twistNum" min="-12" max="12" step="0.5" value="0" />
      </div>
    </div>

    <!-- Fuselage Section -->
    <div class="panel-section">
      <h3>Fuselage</h3>

      <div class="field">
        <label>Length <span class="unit">m</span></label>
        <input type="range" id="fuseLengthSlider" min="2" max="40" step="0.1" value="8" />
        <input type="number" id="fuseLengthNum" min="2" max="40" step="0.1" value="8" />
      </div>

      <div class="field">
        <label>Max Diameter <span class="unit">m</span></label>
        <input type="range" id="fuseDiamSlider" min="0.2" max="8" step="0.05" value="1.2" />
        <input type="number" id="fuseDiamNum" min="0.2" max="8" step="0.05" value="1.2" />
      </div>

      <div class="field">
        <label>Nose Fineness <span class="unit">ratio</span></label>
        <input type="range" id="noseSharpSlider" min="0.5" max="6" step="0.1" value="2" />
        <input type="number" id="noseSharpNum" min="0.5" max="6" step="0.1" value="2" />
      </div>
    </div>

    <!-- Material Section -->
    <div class="panel-section">
      <h3>Material</h3>
      <div class="field">
        <select id="materialSelect">
          <option value="aluminum">Aluminum 7075 — 2.81 g/cm³</option>
          <option value="titanium">Titanium Grade 5 — 4.43 g/cm³</option>
          <option value="carbonFiber">Carbon Fiber Composite — 1.60 g/cm³</option>
        </select>
      </div>
    </div>

    <!-- Display Options -->
    <div class="panel-section">
      <h3>Display</h3>
      <div class="field">
        <label>Opacity</label>
        <input type="range" id="opacitySlider" min="0.1" max="1.0" step="0.01" value="1.0" />
      </div>
      <div class="field">
        <label>Grid Size <span class="unit">m</span></label>
        <input type="range" id="gridSlider" min="10" max="200" step="10" value="60" />
        <input type="number" id="gridNum" min="10" max="200" step="10" value="60" />
      </div>
    </div>

  </div>

  <!-- ── Bottom Panel: Telemetry ── -->
  <div id="bottomPanel">
    <div class="telem-block">
      <span class="telem-label">Total Mass</span>
      <span class="telem-val" id="t-mass">—</span>
      <span class="telem-unit">kg</span>
    </div>
    <div class="telem-block">
      <span class="telem-label">Wing Mass</span>
      <span class="telem-val" id="t-wingmass">—</span>
      <span class="telem-unit">kg</span>
    </div>
    <div class="telem-block">
      <span class="telem-label">Fuse Mass</span>
      <span class="telem-val" id="t-fusemass">—</span>
      <span class="telem-unit">kg</span>
    </div>
    <div class="telem-block">
      <span class="telem-label">Wing Area</span>
      <span class="telem-val" id="t-wingarea">—</span>
      <span class="telem-unit">m²</span>
    </div>
    <div class="telem-block">
      <span class="telem-label">Aspect Ratio</span>
      <span class="telem-val" id="t-ar">—</span>
    </div>
    <div class="telem-block">
      <span class="telem-label">Wing Volume</span>
      <span class="telem-val" id="t-wingvol">—</span>
      <span class="telem-unit">m³</span>
    </div>
    <div class="telem-block">
      <span class="telem-label">Fuse Volume</span>
      <span class="telem-val" id="t-fusevol">—</span>
      <span class="telem-unit">m³</span>
    </div>
    <div class="telem-block">
      <span class="telem-label">CoG (x,y,z)</span>
      <span class="telem-val" id="t-cog" style="font-size:11px">—</span>
      <span class="telem-unit">m</span>
    </div>
  </div>

  <!-- ── Axis Labels Overlay ── -->
  <div id="axisLabels">
    <span class="ax-x">X +</span>
    <span class="ax-y">Y ↑</span>
    <span class="ax-z">Z +</span>
  </div>

  <!-- ── Toast Notification ── -->
  <div id="toast"></div>

  <!-- ── Main Script (ES module) ── -->
  <script type="module" src="script.js"></script>
</body>
</html>
